name: Hudi

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - branch-*
  pull_request:
    branches:
      - master
      - branch-*

concurrency:
  group: hudi-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-hudi:
    name: Test Hudi (${{ matrix.sparkver }} / JDK${{ matrix.javaver }} / Scala${{ matrix.scalaver }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - sparkver: "3.0"
            scalaver: "2.12"
            javaver: "8"
            hudiver: "0.15"
          - sparkver: "3.1"
            scalaver: "2.12"
            javaver: "8"
            hudiver: "0.15"
          - sparkver: "3.2"
            scalaver: "2.12"
            javaver: "8"
            hudiver: "0.15"
          - sparkver: "3.3"
            scalaver: "2.12"
            javaver: "8"
            hudiver: "0.15"
          - sparkver: "3.4"
            scalaver: "2.12"
            javaver: "17"
            hudiver: "0.15"
          - sparkver: "3.5"
            scalaver: "2.12"
            javaver: "17"
            hudiver: "0.15"
          - sparkver: "3.5"
            scalaver: "2.12"
            hudiver: "0.15"
            javaver: "21"

    steps:
      - name: Checkout Auron
        uses: actions/checkout@v6

      - name: Setup Java and Maven cache
        uses: actions/setup-java@v5
        with:
          distribution: 'adopt-hotspot'
          java-version: ${{ matrix.javaver }}
          cache: 'maven'

      - name: Build dependencies (skip tests)
        run: >
          ./build/mvn -B install
          -pl thirdparty/auron-hudi
          -am
          -Pscala-${{ matrix.scalaver }}
          -Pspark-${{ matrix.sparkver }}
          -Phudi-${{ matrix.hudiver }}
          -Prelease
          -DskipTests

      - name: Test Hudi Module
        run: >
          ./build/mvn -B test
          -pl thirdparty/auron-hudi
          -Pscala-${{ matrix.scalaver }}
          -Pspark-${{ matrix.sparkver }}
          -Phudi-${{ matrix.hudiver }}
          -Prelease

      - name: Upload reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: auron-hudi-${{ matrix.sparkver }}-hudi${{ matrix.hudiver }}-jdk${{ matrix.javaver }}-test-report
          path: thirdparty/auron-hudi/target/surefire-reports
